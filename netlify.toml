# Netlify configuration for SignDeployer
# Static site at the repo root + serverless functions in netlify/functions.
# Each function declares its own route via `export const config = { path }`,
# e.g. /api/create-checkout-session, so no redirects are needed.

[build]
  publish = "."
  functions = "netlify/functions"

[build.environment]
  # The browser app must ship PUBLIC, publishable values to work:
  #   - Supabase project URL + anon/publishable key  → assets/js/config.js
  #   - Mapbox PUBLIC token (pk.…)                    → app.html
  # Netlify's secret scanner flags these as false positives. Exclude the known
  # public files/keys so the build passes. REAL secrets (Stripe secret key,
  # Supabase service-role key, Stripe webhook secret) live only in Netlify env
  # vars / functions and are NOT in these files, so they remain protected.
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,APP_URL"
  SECRETS_SCAN_OMIT_PATHS = "assets/js/config.js,app.html,index.html"

[functions]
  node_bundler = "esbuild"

# ---------------------------------------------------------------------------
# Security headers (all pages).
#  - CSP: only our own files + the three CDNs we actually use may run script;
#    'unsafe-inline' is required for the inline <script>/<style> blocks in the
#    HTML pages (tightening to nonces is a future refactor).
#  - frame-ancestors/X-Frame-Options: the site can never be iframed
#    (clickjacking on the login modal / billing buttons).
#  - img-src allows https: because brokerage owners may point their logo at
#    any https URL.
# ---------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://api.mapbox.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://api.mapbox.com; font-src https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://api.mapbox.com https://events.mapbox.com https://*.supabase.co; worker-src blob:; child-src blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
